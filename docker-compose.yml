services:
  postgres:
    image: postgres:16
    container_name: fraud-monitoring-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-fraud_monitoring_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5544}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-fraud_monitoring_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: fraud-monitoring-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      # Redpanda advertises itself under a hostname/port pair a client can actually reach - the
      # container-network hostname for other Compose services, and localhost for anything on the host.
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-monitoring-backend
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      # Container-to-container: reach Postgres by its Compose service name on its internal port
      # (5432), not the host-mapped ${DB_PORT} used for external tools like psql.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-fraud_monitoring_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: 8080
      # Container-to-container: reach ml-service by its Compose service name, not localhost.
      ML_SERVICE_URL: http://ml-service:8000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SPRING_PROFILES_ACTIVE: dev
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      SECURITY_ENABLED: ${SECURITY_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-local-dev-insecure-jwt-signing-secret-change-this-in-production-0123456789}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@fraud.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Admin@12345}
      DEFAULT_ADMIN_FULL_NAME: ${DEFAULT_ADMIN_FULL_NAME:-System Administrator}
      # Must match ml-service's ML_API_KEY below. Blank by default (auth disabled between the two
      # services) - set both to the same value for anything beyond local dev.
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      # Container-to-container: reach Redpanda by its Compose service name, not localhost.
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    ports:
      - "8080:8080"
    healthcheck:
      # /api/v1/customers now requires auth (401 without a token) - use the permitAll actuator
      # health endpoint instead so the healthcheck doesn't depend on a logged-in session.
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: fraud-monitoring-ml-service
    environment:
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PAYSIM_DATA_PATH: /data/raw/paysim/
      # Must match the backend's ML_SERVICE_API_KEY. Only guards /score, /batch-score, /retrain -
      # /health and /model-info stay open since the dashboard calls them directly from the browser.
      ML_API_KEY: ${ML_SERVICE_API_KEY:-}
    volumes:
      - ./data:/data
      - ./ml-service/models:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked in at build time into the client bundle - these run in the USER'S BROWSER,
        # so they must stay as browser-reachable localhost URLs, never the Docker service names.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        NEXT_PUBLIC_ML_SERVICE_URL: http://localhost:8000
    container_name: fraud-monitoring-frontend
    depends_on:
      - backend
      - ml-service
    ports:
      - "3000:3000"

volumes:
  postgres_data:
