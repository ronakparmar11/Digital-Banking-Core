name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fraud_monitoring_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fraud_monitoring_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5544
      DB_NAME: fraud_monitoring_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Compile
        run: ./mvnw -B compile

      - name: Test
        run: ./mvnw -B test

      - name: Package
        run: ./mvnw -B package -DskipTests

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8081
          NEXT_PUBLIC_ML_SERVICE_URL: http://localhost:8000
        run: npm run build

  ml-service:
    name: ML Service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test
        run: pytest -v
